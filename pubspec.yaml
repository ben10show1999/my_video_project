name: my_video_project
description: A clean, high-performance video streaming app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Essentials
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  provider: ^6.1.1

  # Network & Image
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.0.3
  url_launcher: ^6.2.5
  flutter_svg: ^2.2.3

  # Video Player Engine
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
